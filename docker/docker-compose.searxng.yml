# docker/docker-compose.searxng.yml
# Self-hosted SearXNG for Deep Research web search (privacy-first, no API key).
# Merge this service into your main docker-compose.yml (or include via -f).
services:
  searxng:
    image: searxng/searxng:latest
    container_name: atlas-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-change-me-in-env}
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    # No host port needed - backend reaches it on the internal network as
    # http://searxng:8080  (set SEARXNG_URL accordingly in the backend env).

# NOTE: ensure backend + worker share this network and have:
#   SEARXNG_URL=http://searxng:8080
