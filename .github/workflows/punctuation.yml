name: T10b Punctuation Gate
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  punctuation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check for non-human punctuation
        run: python3 tools/humanize_punctuation.py --check
